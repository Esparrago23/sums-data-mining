name: CI - Seguridad (bandit + pip-audit)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  security-scan:
    name: bandit + pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar herramientas de análisis
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Bandit (análisis estático de seguridad)
        # -ll: solo reporta severidad media/alta para evitar ruido de falsos
        # positivos típicos de bandit en bajo nivel; no falla el job en low.
        run: |
          bandit -r integracion subcomponente_A_OCR/src subcomponente_B_ETL_Risk/src subcomponente_C_busqueda/src -ll

      - name: pip-audit (vulnerabilidades conocidas en dependencias)
        run: |
          pip-audit -r requirements.txt

      - name: Smoke test - compilación de módulos principales
        # Verificación mínima de que los archivos clave son sintácticamente
        # válidos, independiente del resultado de bandit/pip-audit.
        run: |
          python -m py_compile integracion/api_mineria.py subcomponente_B_ETL_Risk/src/load_to_bd_sql.py
