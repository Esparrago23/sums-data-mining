worker_processes 1;
events { worker_connections 1024; }
http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    server {
        listen 80;
        # Default de nginx es 1MB -- una foto de cédula tomada con cámara de
        # celular casi siempre lo supera (típico 2-8MB), lo que produce un
        # 413 Payload Too Large antes de que la petición llegue a FastAPI
        # (que no tiene límite propio). 25MB da margen de sobra.
        client_max_body_size 25m;
        location / {
            proxy_pass http://mineria-api:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
